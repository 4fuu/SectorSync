[workspace]
members = [
    "crates/sectorsync-core",
    "crates/sectorsync-wire",
    "crates/sectorsync-transport",
    "crates/sectorsync-runtime",
    "crates/sectorsync-bench",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://example.invalid/sectorsync"
rust-version = "1.88"

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
