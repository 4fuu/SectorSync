name: Automatic release

on:
  schedule:
    # GitHub cron is UTC. 00:00 UTC is 08:00 in Asia/Hong_Kong.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: automatic-release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Publish unreleased main commits
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Detect unreleased commits
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current_version="$(cargo metadata --no-deps --format-version=1 | jq -r '
            [.packages[]
              | select(.name == "sectorsync-core"
                    or .name == "sectorsync-wire"
                    or .name == "sectorsync-transport"
                    or .name == "sectorsync-runtime"
                    or .name == "sectorsync")
              | .version]
            | unique
            | if length == 1 then .[0] else error("published crate versions differ") end')"

          if [[ ! "$current_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Automatic releases require a stable three-part numeric version: $current_version" >&2
            exit 1
          fi

          calendar_prefix="$(TZ=Asia/Hong_Kong date '+%Y.%-m%d')"
          current_tag="v$current_version"
          head_commit="$(git rev-parse HEAD)"
          if git rev-parse --verify --quiet "refs/tags/$current_tag" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "$current_tag")"
            if [[ "$tag_commit" == "$head_commit" ]]; then
              complete=true
              if ! gh release view "$current_tag" >/dev/null 2>&1; then
                complete=false
              else
                for crate in sectorsync-core sectorsync-wire sectorsync-transport sectorsync-runtime sectorsync; do
                  if ! curl --fail --silent --show-error \
                    --user-agent "SectorSync release workflow (https://github.com/4fuu/SectorSync)" \
                    "https://crates.io/api/v1/crates/$crate/$current_version" >/dev/null; then
                    complete=false
                    break
                  fi
                done
              fi
              if [[ "$complete" == "true" ]]; then
                echo "main is already fully released as $current_tag."
                echo "should_release=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              # Recover the same version when publishing or GitHub Release
              # creation was interrupted after its tag reached main.
              release_version="$current_version"
              needs_bump=false
            else
              latest_calendar_tag="$(
                git tag --list "v$calendar_prefix.*" --sort=-version:refname | head -n 1
              )"
              if [[ -n "$latest_calendar_tag" ]]; then
                revision="${latest_calendar_tag##*.}"
                if [[ ! "$revision" =~ ^(0|[1-9][0-9]*)$ ]]; then
                  echo "Invalid calendar revision in tag: $latest_calendar_tag" >&2
                  exit 1
                fi
                release_version="$calendar_prefix.$((revision + 1))"
              else
                release_version="$calendar_prefix.0"
              fi
              needs_bump=true
            fi
          else
            # A missing current tag means either the first release or recovery
            # from a partially completed run. Reuse the manifest version.
            release_version="$current_version"
            needs_bump=false
          fi

          if git rev-parse --verify --quiet "refs/tags/v$release_version" >/dev/null \
            && [[ "$(git rev-list -n 1 "v$release_version")" != "$head_commit" ]]; then
              echo "Cannot publish: tag v$release_version exists at another commit." >&2
              exit 1
          fi

          echo "Releasing main as v$release_version (version bump: $needs_bump)."
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "version=$release_version" >> "$GITHUB_OUTPUT"
          echo "needs_bump=$needs_bump" >> "$GITHUB_OUTPUT"

      - name: Prepare calendar version
        if: steps.release.outputs.needs_bump == 'true'
        shell: bash
        env:
          CURRENT_VERSION: ${{ steps.release.outputs.current_version }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("Cargo.toml")
          current_version = os.environ["CURRENT_VERSION"]
          release_version = os.environ["RELEASE_VERSION"]
          package_current = f'version = "{current_version}"'
          package_release = f'version = "{release_version}"'
          dependency_current = f'version = "={current_version}"'
          dependency_release = f'version = "={release_version}"'
          text = path.read_text(encoding="utf-8")
          if text.count(package_current) != 1 or text.count(dependency_current) != 4:
              raise SystemExit("expected one package and four exact dependency version entries")
          text = text.replace(package_current, package_release)
          text = text.replace(dependency_current, dependency_release)
          path.write_text(text, encoding="utf-8")

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          readme_dependency_current = f'"={current_version}"'
          readme_dependency_release = f'"={release_version}"'
          if readme.count(readme_dependency_current) != 6:
              raise SystemExit("expected six exact dependency versions in README.md")
          readme_path.write_text(
              readme.replace(readme_dependency_current, readme_dependency_release),
              encoding="utf-8",
          )
          PY
          cargo check --workspace --all-features

      - name: Run release quality gate
        if: steps.release.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps --locked
          cargo run -q -p sectorsync-bench --locked -- --profile=smoke
          git diff --check

      - name: Commit release version
        if: steps.release.outputs.needs_bump == 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock README.md
          git commit -m "Release v$RELEASE_VERSION"
          git push origin HEAD:main

      - name: Confirm release commit is current main
        if: steps.release.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "main changed during release preparation; refusing to publish." >&2
            exit 1
          fi

      - name: Authenticate with crates.io trusted publishing
        if: steps.release.outputs.should_release == 'true'
        id: crates_auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish crates.io packages
        if: steps.release.outputs.should_release == 'true'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_auth.outputs.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          wait_for_registry() {
            local crate="$1"
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error \
                --user-agent "SectorSync release workflow (https://github.com/4fuu/SectorSync)" \
                "https://crates.io/api/v1/crates/$crate/$RELEASE_VERSION" >/dev/null; then
                return 0
              fi
              echo "Waiting for $crate $RELEASE_VERSION to reach the registry ($attempt/30)..."
              sleep 10
            done
            echo "$crate $RELEASE_VERSION did not reach the registry in time." >&2
            return 1
          }

          for crate in sectorsync-core sectorsync-wire sectorsync-transport sectorsync-runtime sectorsync; do
            if curl --fail --silent --show-error \
              --user-agent "SectorSync release workflow (https://github.com/4fuu/SectorSync)" \
              "https://crates.io/api/v1/crates/$crate/$RELEASE_VERSION" >/dev/null; then
              echo "$crate $RELEASE_VERSION is already published; skipping."
              continue
            fi
            cargo publish --package "$crate" --locked
            wait_for_registry "$crate"
          done

      - name: Build source archives
        if: steps.release.outputs.should_release == 'true'
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          prefix="SectorSync-$RELEASE_VERSION/"
          git archive --format=tar.gz --prefix="$prefix" \
            --output="dist/SectorSync-$RELEASE_VERSION.tar.gz" HEAD
          git archive --format=zip --prefix="$prefix" \
            --output="dist/SectorSync-$RELEASE_VERSION.zip" HEAD
          sha256sum dist/SectorSync-* > dist/SHA256SUMS

      - name: Upload source archives
        if: steps.release.outputs.should_release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sectorsync-${{ steps.release.outputs.version }}-source
          path: |
            dist/SectorSync-*.tar.gz
            dist/SectorSync-*.zip
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: steps.release.outputs.should_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "v$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "GitHub Release v$RELEASE_VERSION already exists; skipping."
          else
            args=(
              "v$RELEASE_VERSION"
              dist/SectorSync-*.tar.gz
              dist/SectorSync-*.zip
              dist/SHA256SUMS
              --title "SectorSync v$RELEASE_VERSION"
              --generate-notes
            )
            if git rev-parse --verify --quiet "refs/tags/v$RELEASE_VERSION" >/dev/null; then
              args+=(--verify-tag)
            else
              args+=(--target "$(git rev-parse HEAD)")
            fi
            gh release create "${args[@]}"
          fi
